# Video Summary Prompt Template
# Generates structured summary from video transcription

name: video_summary
version: "1.0"
language: zh
description: Generate structured summary from video transcription

# Template variables
variables:
  video_title:
    type: string
    required: true
    description: Video title
  transcript:
    type: string
    required: true
    description: Full video transcript text
  language:
    type: string
    required: false
    default: "zh"
    description: Output language (zh/en)
  focus_areas:
    type: list
    required: false
    default: []
    description: Specific areas to focus on (e.g., ["技术要点", "实践案例"])

# JSON Schema for structured output
output_schema:
  type: object
  properties:
    title:
      type: string
      description: Video title or main topic
    duration_estimate:
      type: string
      description: Estimated video duration (e.g., "15分钟")
    summary:
      type: string
      description: Brief overall summary (2-3 sentences)
    key_points:
      type: array
      items:
        type: object
        properties:
          point:
            type: string
            description: Key point description
          timestamp:
            type: string
            description: Approximate timestamp (if available)
          importance:
            type: string
            enum: [high, medium, low]
        required: [point, importance]
    chapters:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
            description: Chapter title
          start_time:
            type: string
            description: Start timestamp
          end_time:
            type: string
            description: End timestamp
          summary:
            type: string
            description: Chapter summary
          screenshot_path:
            type: string
            description: Relative path to screenshot (filled by system, not LLM)
        required: [title, start_time, summary]
    qa_items:
      type: array
      items:
        type: object
        properties:
          question:
            type: string
            description: Question viewers might ask
          answer:
            type: string
            description: Answer based on video content
        required: [question, answer]
    topics:
      type: array
      items:
        type: string
      description: Main topics covered
    mindmap_structure:
      type: object
      description: Mindmap structure for visualization
      properties:
        root:
          type: string
          description: Root node topic (video main theme)
        children:
          type: array
          items:
            type: object
            properties:
              topic:
                type: string
                description: Level 1 node (main section)
              children:
                type: array
                items:
                  type: object
                  properties:
                    subtopic:
                      type: string
                      description: Level 2 node (sub section)
                    details:
                      type: array
                      items:
                        type: string
                      description: Level 3 nodes (specific points)
          required: [topic]
      required: [root, children]
  required: [title, summary, key_points, chapters]

# System prompt
system_prompt: |
  你是一位专业的内容分析专家，擅长从视频内容中提炼核心观点，生成专业、准确、结构化的内容总结。

  你需要遵循以下专业标准：

  ## 标题要求
  - 专业性：使用准确、专业的术语
  - 简洁性：避免冗长，突出核心主题
  - 完整性：涵盖主要内容和观点
  - 示例：
    * 不佳："这是一个关于Python的视频"
    * 优秀："Python 异步编程：原理、应用与最佳实践"

  ## 概述要求
  - 客观性：准确反映视频内容，避免主观判断
  - 专业性：使用专业术语，体现深度理解
  - 结构性：先阐述核心观点，再说明背景/原因，最后指出意义/影响
  - 长度：2-4句话，约100-200字
  - 示例：
    * 不佳："这个视频讲了花甲和玻璃纤维的关系"
    * 优秀："网络传言'吃花甲等于吃玻璃纤维'源于对科研文献的误读。研究显示特定海域野生牡蛎体内检测出玻璃纤维，与养殖贝类关联度低，且经消化道摄入对人体风险有限。该研究旨在警示海洋污染，而非食品安全风险。"

  ## 章节标题要求
  - 专业性：使用准确、专业的表述
  - 结构化：体现逻辑层次（问题-分析-结论，或 现象-原因-影响）
  - 具体化：避免模糊标题，要有实质内容
  - 格式：可采用"主题+角度"模式
  - 示例：
    * 不佳："第一部分"、"介绍"、"总结"
    * 优秀："谣言溯源：营销号的误读与夸大"、"研究剖析：实验设计与核心发现"、"风险评估：玻璃纤维的人体危害分析"

  输出格式要求（严格遵守）：
  - 必须返回合法的 JSON 对象（可用 json.loads 解析）
  - 所有字段名必须使用英文：title, summary, key_points, chapters
  - chapters 必须是数组，每个元素必须有 title（字符串）、start_time、summary 字段
  - key_points 必须是数组，每个元素必须有 point、importance 字段
  - 不要使用中文字段名或嵌套对象作为章节标题

  JSON 结构示例：
  {
    "title": "专业标题",
    "summary": "专业概述",
    "key_points": [
      {"point": "关键点描述", "importance": "high"}
    ],
    "chapters": [
      {"title": "章节标题（字符串）", "start_time": "00:00", "summary": "章节概述"}
    ]
  }

# User prompt template
user_prompt: |
  视频原始标题：{{video_title}}

  转录文本：
  {{transcript}}

  {% if focus_areas %}
  重点关注领域：
  {% for area in focus_areas %}
  - {{area}}
  {% endfor %}
  {% endif %}

  请生成专业、详细的内容总结：

  ## 输出要求（JSON 格式）

  1. **标题**（title 字段，字符串）：专业、准确、简洁（1句话）

  2. **概述**（summary 字段，字符串）：200-300字，包含：
     - 核心观点（1-2句话）
     - 研究背景或事件起因（1-2句话）
     - 关键证据或论证过程（2-3句话）
     - 结论与影响（1-2句话）

  3. **章节**（chapters 字段，数组）：5-8个章节，每个章节对象包含：
     - title（字符串）：专业、具体、有层次的标题（10-20字）
     - start_time（字符串）：时间戳，如 "00:00"
     - summary（字符串）：详细概括章节内容（80-120字），包含具体事实、数据、论点

  4. **关键要点**（key_points 字段，数组）：3-5个核心要点，每个要点对象包含：
     - point（字符串）：详细的要点描述（包含具体信息，不只是概括）
     - importance（字符串）：重要性级别（high/medium/low）

  5. **问答预判**（qa_items 字段，数组）：3-5个观众可能产生的疑问，每个问题对象包含：
     - question（字符串）：观众可能提出的问题
     - answer（字符串）：基于视频内容的准确解答

  6. **主题标签**（topics 字段，数组）：5-10个相关主题标签

  7. **思维导图结构**（mindmap_structure 字段，对象）：用于可视化展示，包含：
     - root（字符串）：根节点主题，使用视频标题或核心主题
     - children（数组）：3-6个一级节点，每个一级节点包含：
       - topic（字符串）：章节/板块标题（对应主要章节）
       - children（数组）：2-4个二级节点，每个二级节点包含：
         - subtopic（字符串）：具体内容点
         - details（数组，可选）：更细的细节点（字符串数组）

     示例：
     {
       "root": "Python异步编程",
       "children": [
         {
           "topic": "基础概念",
           "children": [
             {"subtopic": "异步vs同步差异"},
             {"subtopic": "事件循环机制"}
           ]
         },
         {
           "topic": "实践应用",
           "children": [
             {"subtopic": "异步爬虫案例"},
             {"subtopic": "并发控制技巧"}
           ]
         }
       ]
     }

  **重要**：输出必须是完整的、合法的 JSON 对象，所有字段名使用英文，章节和关键要点使用数组格式（方括号 []）。

  输出语言：{{language}}

# Example for few-shot learning (JSON format)
