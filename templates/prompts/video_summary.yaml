# Video Summary Prompt Template
# Generates structured summary from video transcription

name: video_summary
version: "1.1"
language: zh
description: Generate structured summary from video transcription

# Template variables
variables:
  video_title:
    type: string
    required: true
    description: Video title
  transcript:
    type: string
    required: true
    description: Full video transcript text
  language:
    type: string
    required: false
    default: "zh"
    description: Output language (zh/en)
  focus_areas:
    type: list
    required: false
    default: []
    description: Specific areas to focus on (e.g., ["技术要点", "实践案例"])

# JSON Schema for structured output
output_schema:
  type: object
  properties:
    title:
      type: string
      description: Video title or main topic
    duration_estimate:
      type: string
      description: Estimated video duration (e.g., "15分钟")
    summary:
      type: string
      description: Brief overall summary (2-3 sentences)
    key_points:
      type: array
      items:
        type: object
        properties:
          point:
            type: string
            description: Key point description
          timestamp:
            type: string
            description: Approximate timestamp (if available)
          importance:
            type: string
            enum: [high, medium, low]
        required: [point, importance]
    chapters:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
            description: Chapter title
          start_time:
            type: string
            description: Start timestamp
          end_time:
            type: string
            description: End timestamp
          summary:
            type: string
            description: Chapter summary
          screenshot_path:
            type: string
            description: Relative path to screenshot (filled by system, not LLM)
        required: [title, start_time, summary]
    knowledge:
      type: array
      items:
        type: object
        properties:
          knowledge:
            type: string
            description: Knowledge point description
          category:
            type: string
            description: Knowledge category (e.g., "概念", "技能", "工具")
        required: [knowledge]
      description: Knowledge points extracted from video (for educational content)
    qa_items:
      type: array
      items:
        type: object
        properties:
          question:
            type: string
            description: Question viewers might ask
          answer:
            type: string
            description: Answer based on video content
        required: [question, answer]
    topics:
      type: array
      items:
        type: string
      description: Main topics covered
    mindmap_structure:
      type: object
      description: Mindmap structure for visualization
      properties:
        root:
          type: string
          description: Root node topic (video main theme)
        children:
          type: array
          items:
            type: object
            properties:
              topic:
                type: string
                description: Level 1 node (main section)
              children:
                type: array
                items:
                  type: object
                  properties:
                    subtopic:
                      type: string
                      description: Level 2 node (sub section)
                    details:
                      type: array
                      items:
                        type: string
                      description: Level 3 nodes (specific points)
          required: [topic]
      required: [root, children]
  required: [title, summary, key_points, chapters, qa_items, topics, mindmap_structure]

# System prompt
system_prompt: |
  你是专业的视频内容分析专家。
  你的任务不是改写原文，而是基于转录内容提炼出可复用、可发布、结构清晰的总结。

  【核心原则】
  - 只依据输入内容作答，不补充视频中未出现的事实、数据、结论或观点
  - 优先提炼“讲了什么、为什么重要、如何展开论证”，不要堆砌口语和重复表达
  - 输出应专业、克制、信息密度高，避免空话、套话、宣传语
  - 若某项信息不足，使用最合理的保守表达；数组字段可返回空数组，不要编造内容
  - start_time 用于后续截图定位，应尽量给出与章节开头对应的近似时间

  【输出规则】
  - 只返回一个合法 JSON 对象
  - 不要输出 Markdown
  - 不要加代码块
  - 不要附加解释
  - 所有字段名必须使用英文
  - chapters 必须是数组，每个元素必须包含 title、start_time、summary
  - key_points 必须是数组，每个元素必须包含 point、importance
  - knowledge、qa_items、topics 在信息不足时可返回空数组
  - mindmap_structure 必须是对象，至少包含 root 和 children

  【字段标准】
  - title：概括主议题，避免泛泛命名
  - summary：先写核心结论，再交代展开路径、关键证据或案例，最后点出价值或影响
  - chapters：按内容推进顺序拆分，不要机械平均分段
  - key_points：只保留最重要、最值得记忆或复用的观点
  - knowledge：提炼可迁移的概念、方法、工具、术语
  - qa_items：站在观众视角预判高价值问题，不要写过于琐碎的问题
  - topics：使用检索友好的主题词
  - mindmap_structure：反映内容层级，不要只是重复章节标题

# User prompt template
user_prompt: |
  【输入信息】
  视频原始标题：{{video_title}}

  转录文本：
  {{transcript}}

  {% if focus_areas %}
  重点关注领域：
  {% for area in focus_areas %}
  - {{area}}
  {% endfor %}
  {% endif %}

  【任务】
  请根据以上内容输出一个完整 JSON 对象。
  输出语言使用：{{language}}

  【字段要求】
  1. title
     - 1句话
     - 准确概括主主题
     - 避免“某某视频介绍”这类空泛命名

  2. summary
     - 200-300字
     - 优先覆盖核心结论、展开逻辑、关键证据或案例、实际意义

  3. chapters
     - 5-8个章节
     - 按内容推进顺序组织
     - 每个章节包含：
       - title：10-20字，具体、有信息量
       - start_time：如 "00:00"，允许近似，但要与章节开头尽量对齐
       - summary：80-120字，写清该章节讲了什么、用了什么论据或案例、得出什么结论

  4. key_points
     - 3-5条
     - 每条都应是高价值结论
     - 不要只是换句话复述标题

  5. knowledge
     - 提炼概念、方法、工具、术语
     - 没有明确知识点时返回空数组

  6. qa_items
     - 3-5组高价值问答
     - 问题要像真实观众会问的
     - 答案要直接、准确

  7. topics
     - 5-10个主题词
     - 优先使用可检索、可归档的表达

  8. mindmap_structure
     - 根据内容逻辑组织层级
     - 不要机械复制章节目录

  【额外约束】
  - 不要编造时间、数据、人物观点或实验结果
  - 口播中的重复、寒暄、广告、无关插话不要写入总结
  - 如果转录文本质量一般，优先保留确定性高的信息
  - 只输出 JSON，不要输出任何额外文字

# Example for few-shot learning (JSON format)
examples:
  - input:
      video_title: "Python 异步编程入门到精通"
      transcript: |
        大家好，今天我们来聊聊 Python 的异步编程。
        首先什么是异步编程呢？
        异步编程是一种并发编程模式...
        [示例转录文本]
    output:
      {
        "title": "Python 异步编程：原理、适用场景与实践边界",
        "summary": "视频围绕 Python 异步编程的核心原理与实际应用展开，重点解释异步模型为何能提升 I/O 密集型任务的处理效率。内容先区分同步与异步的执行差异，再说明事件循环、协程和 async/await 的配合机制，随后用网络请求与爬虫案例展示性能收益及编码方式。视频同时指出异步并不适用于 CPU 密集型任务，并总结阻塞事件循环、误用同步函数等常见问题，帮助观众建立更准确的使用边界。",
        "key_points": [
          {
            "point": "异步编程通过事件循环协调多个等待中的 I/O 任务，使单线程也能保持较高并发能力，核心优势在于减少等待时间浪费。",
            "importance": "high"
          },
          {
            "point": "async/await 让协程写法更接近同步代码，但本质仍依赖事件循环进行调度，理解这一点有助于排查执行阻塞问题。",
            "importance": "high"
          },
          {
            "point": "在异步函数中调用同步阻塞函数会卡住整个事件循环，这是异步代码性能失效的最常见原因之一。",
            "importance": "high"
          },
          {
            "point": "异步编程主要适合网络、文件、数据库等 I/O 密集型场景，对 CPU 密集型计算并不能直接带来明显收益。",
            "importance": "medium"
          }
        ],
        "chapters": [
          {
            "title": "基础概念：同步与异步的差异",
            "start_time": "00:00",
            "summary": "从执行方式入手解释同步与异步的根本差别，说明异步并不是“同时做很多事”，而是在等待 I/O 时切换任务，以提高资源利用率。视频还对比了多线程与异步模型在开销和适用场景上的差异。"
          },
          {
            "title": "核心机制：事件循环如何调度协程",
            "start_time": "05:30",
            "summary": "围绕 asyncio 展开，解释事件循环如何管理等待中的任务，以及 await 如何触发协程的挂起与恢复。内容强调协程调度不是抢占式并发，而是基于显式让出执行权的协作机制。"
          },
          {
            "title": "实践应用：网络请求与爬虫案例",
            "start_time": "12:00",
            "summary": "通过异步 HTTP 请求和爬虫示例展示实际收益，说明在大量请求等待返回的场景下，异步模型通常能显著缩短总耗时。视频也借此说明 aiohttp 一类异步库在工程实践中的典型用法。"
          },
          {
            "title": "常见陷阱：阻塞代码破坏异步收益",
            "start_time": "18:30",
            "summary": "总结多个高频错误，包括在异步函数中调用同步阻塞函数、遗漏 await、无必要地引入异步导致复杂度升高等。视频用反例说明这些问题会直接削弱吞吐量，甚至让异步代码失去意义。"
          },
          {
            "title": "进阶技巧：并发控制与异常处理",
            "start_time": "23:00",
            "summary": "进一步介绍并发上限控制、异常传播、超时取消等工程化问题，说明异步代码不仅要跑得快，还要可控、可恢复。内容涉及 Semaphore、wait_for 等常见工具的典型使用方式。"
          },
          {
            "title": "性能边界：异步方案何时值得使用",
            "start_time": "28:15",
            "summary": "最后回到方法边界，说明异步并非普适优化手段，而是对特定任务类型最有效。通过性能对比与限制分析，帮助观众判断何时该用异步、何时应考虑线程、多进程或其他方案。"
          }
        ],
        "qa_items": [
          {
            "question": "异步编程和同步编程的主要区别是什么？",
            "answer": "同步编程按顺序执行，每个任务完成后才执行下一个；异步编程可以在等待 I/O 时切换到其他任务，单线程就能处理多个并发请求，效率更高。"
          },
          {
            "question": "什么场景适合使用异步编程？",
            "answer": "网络请求、文件读写、数据库查询等 I/O 密集型任务。对 CPU 密集型计算任务（如图像处理、科学计算）无明显优势。"
          },
          {
            "question": "async/await 的本质是什么？",
            "answer": "是协程的语法糖，让异步代码写起来像同步代码，本质上还是基于生成器的协作式多任务，由事件循环调度。"
          },
          {
            "question": "在异步函数中能用 time.sleep() 吗？",
            "answer": "不能！time.sleep() 是同步阻塞函数，会阻塞整个事件循环。应该用 asyncio.sleep()，它是异步非阻塞的。"
          }
        ],
        "knowledge": [
          {"knowledge": "asyncio 是 Python 原生异步编程的核心框架", "category": "工具"},
          {"knowledge": "事件循环负责调度协程与等待中的 I/O 任务", "category": "概念"},
          {"knowledge": "协程是以显式挂起和恢复为特征的轻量执行单元", "category": "概念"},
          {"knowledge": "Semaphore 可用于限制异步任务并发数量", "category": "工具"}
        ],
        "topics": ["Python", "异步编程", "asyncio", "协程", "事件循环", "并发编程", "I/O密集型", "性能优化", "aiohttp", "爬虫"]
      }
