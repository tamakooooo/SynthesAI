name: vocabulary_extraction
version: "1.0"
language: zh
description: 从内容中提取重要单词并生成完整的单词卡

variables:
  - name: content
    type: string
    required: true
    description: 要提取单词的内容文本
  - name: word_count
    type: integer
    required: true
    default: 10
    description: 要提取的单词数量
  - name: difficulty_distribution
    type: string
    required: false
    default: "beginner: 30%, intermediate: 50%, advanced: 20%"
    description: 难度分布

output_format: json

template: |
  你是一位专业的词汇教学专家，擅长从文本中提取重要单词并生成结构化的学习卡片。

  请从以下内容中提取 {{word_count}} 个重要的英语单词，并为每个单词生成完整的学习卡片。

  ## 内容
  {{content}}

  ## 提取要求

  1. **单词数量**: 提取 {{word_count}} 个重要单词
  2. **难度分布**: {{difficulty_distribution}}
  3. **选择标准**:
     - 高频词汇（常用词优先）
     - 关键概念词（对理解内容重要）
     - 学术词汇（如果是学术内容）
     - 避免过于简单（如 a, the, is）或过于罕见的词

  ## 单词卡内容要求

  对每个单词，必须提供：

  ### 必填字段
  - **word**: 英文单词
  - **part_of_speech**: 词性（noun/verb/adj/adv/prep/etc）
  - **definition**: 释义对象
    - zh: 中文释义（准确、简洁）
    - en: 英文释义（可选但推荐）
  - **example_sentences**: 例句数组（至少2个）
    - sentence: 例句
    - translation: 中文翻译
    - context: "原文提取" 或 "LLM生成"
  - **difficulty**: beginner/intermediate/advanced
  - **frequency**: high/medium/low

  ### 推荐字段
  - **phonetic**: 音标对象
    - us: 美式音标（IPA格式）
    - uk: 英式音标（IPA格式）
  - **synonyms**: 同义词数组（2-3个）
  - **antonyms**: 反义词数组（1-2个，如果有）
  - **related_words**: 相关词汇数组（词根、派生词等）

  ## 输出格式

  请严格按照以下 JSON Schema 输出：

  ```json
  {
    "vocabulary_cards": [
      {
        "word": "example",
        "phonetic": {
          "us": "/ɪgˈzæmpəl/",
          "uk": "/ɪgˈzɑːmpəl/"
        },
        "part_of_speech": "noun",
        "definition": {
          "zh": "例子，实例",
          "en": "a thing characteristic of its kind or illustrating a general rule"
        },
        "example_sentences": [
          {
            "sentence": "This is an example from the original text.",
            "translation": "这是原文中的例子。",
            "context": "原文提取"
          },
          {
            "sentence": "Can you give me an example?",
            "translation": "你能给我一个例子吗？",
            "context": "LLM生成"
          }
        ],
        "synonyms": ["instance", "case", "sample"],
        "antonyms": [],
        "related_words": ["exemplify", "exemplary"],
        "difficulty": "beginner",
        "frequency": "high"
      }
    ],
    "statistics": {
      "total_words": 10,
      "difficulty_distribution": {
        "beginner": 3,
        "intermediate": 5,
        "advanced": 2
      }
    }
  }
  ```

  ## 注意事项

  1. **音标准确性**: 使用 IPA 国际音标，确保准确
  2. **释义准确性**: 避免误导性翻译，考虑上下文
  3. **例句质量**:
     - 至少1个例句从原文提取（如果有）
     - 至少1个例句自行生成（更通用、更实用）
     - 句子应自然、实用，避免生造
  4. **同义词/反义词**: 准确匹配，不要随意填写
  5. **难度评估**: 综合考虑词频、使用场景、专业程度

  ## 重要提示

  - 输出必须是合法的 JSON 格式
  - 不要输出任何额外文本或说明
  - 确保 JSON 可以被正确解析
  - 如果无法从原文提取例句，全部使用 LLM 生成