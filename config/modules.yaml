# Learning Assistant - Module Configuration
# Version: 0.1.0

# Module Configuration
modules:
  # Video Summary Module (MVP Priority)
  video_summary:
    enabled: true
    priority: 1  # Higher priority = loaded first

    # Module-specific configuration
    config:
      # LLM settings
      llm:
        provider: "openai"
        model: "kimi-k2.5"
        base_url: "https://api.tamako.online/v1"
        temperature: 0.3
        max_tokens: 32768

      # Video download settings
      download:
        # Output directory for downloaded videos
        output_dir: "data/cache/downloads"
        # Video quality (best, medium, worst)
        quality: "medium"
        # Maximum download duration in minutes
        max_duration: 60
        # Supported platforms
        platforms:
          - "bilibili"
          - "youtube"
          - "douyin"
          - "tiktok"
        # Cookie files for authenticated download
        cookies:
          bilibili: "config/cookies/bilibili_cookies.txt"
          douyin: "config/cookies/douyin_cookies.txt"
          youtube: "config/cookies/youtube_cookies.txt"

      # Authentication settings
      auth:
        enabled: true
        providers:
          bilibili:
            enabled: true
            timeout: 180  # QR code timeout in seconds
            poll_interval: 2  # Polling interval in seconds
          douyin:
            enabled: true  # Manual cookie import

      # Audio extraction settings
      audio:
        # Audio format (wav, mp3, aac)
        format: "wav"
        # Audio quality (high, medium, low)
        quality: "medium"
        # Sample rate
        sample_rate: 16000

      # Transcription settings
      transcription:
        # Whisper model size (tiny, base, small, medium, large)
        model: "base"
        # Language (auto, en, zh, ja, etc.)
        language: "auto"
        # Enable VAD (Voice Activity Detection)
        vad: true
        # Output format (json, srt, txt)
        output_format: "json"

      # Summary settings
      summary:
        # LLM prompt template
        prompt_template: "templates/prompts/video_summary.yaml"
        # Summary output language
        output_language: "zh"  # zh, en
        # Maximum tokens for summary
        max_tokens: 2000

      # Export settings
      export:
        # Default output format
        format: "markdown"
        # Include timestamps
        timestamps: true
        # Include chapters
        chapters: true
        # Include key points
        key_points: true

      # Frame extraction settings
      frame_extraction:
        # Enable frame extraction for chapters
        enabled: true
        # Output directory for extracted frames
        output_dir: "data/frames"
        # Image format (jpg or png)
        format: "jpg"
        # JPEG quality (1-100, higher = better quality)
        quality: 85

    # CLI command configuration
    cli:
      command_name: "video"
      description: "Summarize video content"
      aliases:
        - "v"
        - "vid"

  # Link Learning Module
  link_learning:
    enabled: true
    priority: 2

    config:
      # Web fetching settings
      fetcher:
        timeout: 30
        max_retries: 3
        retry_delay: 2
        use_playwright: false
        user_agent: null
        proxy: null

      # Content parsing settings
      parser:
        engine: "trafilatura"
        include_comments: false
        include_tables: true
        favor_precision: true
        min_content_length: 10  # Temporarily lowered for testing

      # LLM settings
      llm:
        provider: "openai"
        model: "kimi-k2.5"
        base_url: "https://api.tamako.online/v1"
        temperature: 0.3
        max_tokens: 2000

      # Output settings
      output:
        format:
          - "markdown"
          - "json"
        directory: "data/outputs/link"
        save_history: true

      # Feature toggles
      features:
        generate_qa: true
        generate_quiz: true
        extract_tags: true
        estimate_difficulty: true

    cli:
      command_name: "link"
      description: "Process web articles and generate knowledge cards"
      aliases:
        - "l"
        - "article"

  # Vocabulary Module
  vocabulary:
    enabled: true
    priority: 3

    config:
      # Word extraction settings
      extraction:
        word_count: 10
        difficulty_distribution:
          beginner: 30%
          intermediate: 50%
          advanced: 20%
        min_word_length: 3
        exclude_stopwords: true

      # Phonetic lookup settings
      phonetic:
        lookup_order:
          - local
          - api
          - llm
        local_dictionary: "data/dictionaries/english.json"
        api_url: "https://api.dictionaryapi.dev/api/v2/entries/en/"

      # LLM settings
      llm:
        provider: "openai"
        model: "kimi-k2.5"
        temperature: 0.3
        max_tokens: 4000

      # Story generation settings
      story:
        enabled: true
        default_word_count: 300
        default_difficulty: "intermediate"

      # Output settings
      output:
        format:
          - markdown
          - json
        directory: "data/outputs/vocabulary"
        save_history: true

        # Visual card generation (NEW)
        visual_card:
          enabled: true           # Enable visual knowledge card generation
          width: 1200             # Card width (editorial standard, 1200px)
          format: png             # Output format: png, jpeg, html_only
          scale: 2.0              # High resolution scaling (2x for retina displays)
          max_words_display: 10   # Maximum words shown in grid cards
          story_max_length: 150   # Truncate story text in panel (chars)
          jpeg_quality: 95        # JPEG quality (1-100, for jpeg format)

    cli:
      command_name: "vocabulary"
      description: "Extract vocabulary and generate word cards"
      aliases:
        - "vocab"
        - "words"