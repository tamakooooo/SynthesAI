# Learning Assistant - Adapter Configuration
# Version: 0.1.0

# Adapter Configuration
adapters:
  feishu:
    enabled: false
    priority: 1

    config:
      app_id_env: "FEISHU_APP_ID"
      app_secret_env: "FEISHU_APP_SECRET"
      space_id: ""
      root_node_token: ""
      publish_modules:
        - "video_summary"
      overwrite_strategy: "create_new"
      title_template: "{module} | {title}"

  # Test Adapter (for validation)
  test_validation:
    enabled: false
    priority: 1

    config:
      # Test settings
      simulate_errors: false
      delay_seconds: 0

    cli:
      command_name: "test"
      description: "Test adapter for validation"

  # Adapter framework is maintained for testing purposes only
  # Production adapters development has been discontinued

# Event Bus Configuration
event_bus:
  enabled: true

  # Event subscriptions (adapter listens to events)
  subscriptions:
    feishu:
      - "video.summarized"
    # Test adapter can subscribe to events for testing
    test_validation:
      - "video.summarized"

  # Event retry policy
  retry:
    # Maximum retries
    max_retries: 3
    # Retry delay in seconds
    delay: 5
    # Exponential backoff
    exponential: true
