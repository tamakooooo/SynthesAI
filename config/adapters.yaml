# SynthesAI - Adapter Configuration
# Production adapters development has been discontinued.
# This file contains only the event bus configuration for the adapter system.

# Adapter Configuration
adapters:
  feishu:
    enabled: false
    priority: 1

    config:
      app_id_env: "FEISHU_APP_ID"
      app_secret_env: "FEISHU_APP_SECRET"
      space_id: ""
      root_node_token: ""
      publish_modules:
        - "video_summary"
      overwrite_strategy: "create_new"
      title_template: "{module} | {title}"

# Event Bus Configuration for Adapter System
event_bus:
  enabled: true

  # Event subscriptions (adapter listens to events)
  subscriptions:
    feishu:
      - "video.summarized"

  # Event retry policy
  retry:
    max_retries: 3
    delay: 5
    # Exponential backoff
    exponential: true
