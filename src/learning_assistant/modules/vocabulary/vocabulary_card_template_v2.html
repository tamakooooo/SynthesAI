<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #FF6B35;
    --primary-dark: #E85A2D;
    --accent: #764BA2;
    --bg: #F5F1EC;
    --bg-light: #FAF7F2;
    --bg-card: #E8E3DC;
    --black: #1A1A1A;
    --white: #FFFFFF;
    --gray: #6B6B6B;
    --gray-light: #999999;
    --highlight: #FFB87A;
  }

  body {
    background: var(--bg);
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--black);
    padding: 0;
    margin: 0;
  }

  .poster {
    width: 1200px;
    background: var(--bg);
    padding: 28px 36px 24px;
    position: relative;
    margin: 0 auto;
  }

  /* Top Bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .top-bar .label-left,
  .top-bar .label-right {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gray);
    font-weight: 700;
  }
  .top-bar .label-right { text-align: right; }

  /* Hero Section */
  .hero-section {
    margin: 12px 0 16px;
    text-align: center;
  }
  .hero-section .hero-word {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1.1;
    margin: 8px 0 6px;
    letter-spacing: -1px;
  }
  .hero-section .hero-subtitle {
    font-size: 12px;
    color: var(--gray);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }

  /* Story Section (Full Width - Expanded) */
  .story-section {
    background: var(--black);
    color: var(--white);
    padding: 28px 32px 24px;
    border-radius: 4px;
    margin-bottom: 18px;
  }
  .story-section .story-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.5px;
  }
  .story-section .story-header .icon { font-size: 18px; }
  .story-section .story-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--primary);
    margin-bottom: 14px;
  }
  .story-section .story-content {
    font-size: 14px;
    line-height: 1.8;
    color: #d4d4d4;
  }
  .story-section .story-content strong {
    color: var(--highlight);
    font-weight: 700;
  }

  /* Dual Panel Section */
  .dual-panel {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 14px;
    margin-bottom: 12px;
  }

  /* Word List Panel (Left) */
  .panel-list {
    background: var(--bg-light);
    padding: 18px 20px 16px;
    border-radius: 3px;
  }
  .panel-list .panel-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: var(--black);
  }
  .panel-list .panel-title .icon {
    color: var(--accent);
    font-size: 16px;
  }
  .word-list-item {
    margin-bottom: 10px;
  }
  .word-list-item:last-child { margin-bottom: 0; }
  .word-list-item .item-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .word-list-item .item-number {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }
  .word-list-item .item-word {
    font-size: 17px;
    font-weight: 900;
    color: var(--black);
  }
  .word-list-item .item-phonetic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    margin-left: 4px;
  }
  .word-list-item .item-info {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.5;
  }
  .word-list-item .item-pos {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 700;
  }

  /* Word Focus Panel (Right) */
  .panel-focus {
    background: var(--bg-card);
    padding: 18px 20px 16px;
    border-radius: 3px;
  }
  .panel-focus .panel-title {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: var(--black);
  }
  .panel-focus .panel-title .icon {
    color: var(--primary);
    font-size: 16px;
  }

  .focus-item {
    margin-bottom: 16px;
  }
  .focus-item:last-child { margin-bottom: 0; }
  .focus-item .focus-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }
  .focus-item .focus-number {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }
  .focus-item .focus-word {
    font-size: 17px;
    font-weight: 900;
    color: var(--black);
  }
  .focus-item .focus-phonetic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 5px;
  }
  .focus-item .focus-def {
    font-size: 13px;
    color: var(--black);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .focus-item .focus-example {
    font-size: 12px;
    color: var(--gray);
    line-height: 1.55;
    font-style: italic;
    border-top: 1px solid rgba(0,0,0,0.08);
    padding-top: 8px;
  }
  .focus-item .focus-example strong {
    color: var(--primary);
    font-weight: 700;
    font-style: normal;
  }

  /* Bottom Bar */
  .bottom-bar {
    background: var(--primary-dark);
    color: var(--white);
    padding: 14px 20px;
    border-radius: 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 30px;
    margin-bottom: 12px;
  }
  .bottom-bar .tags {
    font-weight: 900;
    font-size: 13px;
    line-height: 1.6;
  }
  .bottom-bar .tags .tag {
    color: var(--highlight);
    margin-right: 8px;
  }
  .bottom-bar .note {
    font-size: 11px;
    line-height: 1.6;
    color: #FFD4B8;
    max-width: 480px;
    text-align: right;
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 4px;
  }
  .footer .left-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gray-light);
    letter-spacing: 0.5px;
  }
  .footer .right-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--gray);
    font-weight: 700;
    text-transform: uppercase;
  }
  .footer .right-brand .dot {
    width: 6px;
    height: 6px;
    background: var(--primary);
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="poster">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="label-left">VOCABULARY CARD · 单词学习</div>
    <div class="label-right">SynthesAI</div>
  </div>

  <!-- HERO SECTION -->
  <div class="hero-section">
    <h1 class="hero-word">{hero_word}</h1>
    <div class="hero-subtitle">{word_count} words · {difficulty}</div>
  </div>

  <!-- STORY SECTION -->
  <div class="story-section">
    <div class="story-header">
      <span class="icon">📖</span>
      上下文故事
    </div>
    <div class="story-title">{story_title}</div>
    <div class="story-content">{story_content}</div>
  </div>

  <!-- DUAL PANEL -->
  <div class="dual-panel">
    <div class="panel-list">
      <div class="panel-title">
        <span class="icon">📚</span>
        单词列表
      </div>
      {word_list}
    </div>

    <div class="panel-focus">
      <div class="panel-title">
        <span class="icon">💡</span>
        重点详解
      </div>
      {word_focus}
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="tags">
      <span class="tag">关键词</span> · {tags}
    </div>
    <div class="note">
      由 SynthesAI 自动生成 · 智能单词提炼
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="left-info">生成时间: {created_at}</div>
    <div class="right-brand">
      <div class="dot"></div>
      SynthesAI
    </div>
  </div>

</div>
</body>
</html>
