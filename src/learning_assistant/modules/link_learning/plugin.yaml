name: link_learning
type: module
version: 0.2.0
description: Link Learning Module - Extract knowledge from web links
author: Learning Assistant Team
enabled: true
priority: 10

dependencies:
  - trafilatura>=1.6.0
  - aiohttp>=3.9.0

optional_dependencies:
  - playwright>=1.40.0
  - readability-lxml>=0.8.1

config:
  fetcher:
    timeout: 30
    max_retries: 3
    retry_delay: 2
    use_playwright: false
  parser:
    engine: trafilatura
    include_comments: false
    include_tables: true
    favor_precision: true
    min_content_length: 200
  llm:
    provider: openai
    model: gpt-4
    temperature: 0.3
    max_tokens: 2000
  output:
    format:
      - markdown
      - json
    directory: data/outputs/link
    save_history: true
  features:
    generate_qa: true
    generate_quiz: true
    extract_tags: true
    estimate_difficulty: true